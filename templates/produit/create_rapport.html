{% extends 'main.html' %}
{% block title %}Nouveau rapport — TELIRMA{% endblock %}

{% block contend %}
<div class="page-header">
  <div>
    <h1><i class="fas fa-file-plus me-2" style="color:var(--steel)"></i>Nouveau rapport</h1>
    <p>Créer un rapport de vérification</p>
  </div>
  <a href="{% url 'article:crm' %}" class="btn btn-outline-primary btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Retour CRM
  </a>
</div>
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-0" style="-webkit-box-shadow:0 4px 24px rgba(13,43,94,0.1);box-shadow:0 4px 24px rgba(13,43,94,0.1)">
      <div style="height:4px;background:-webkit-linear-gradient(left,var(--navy),var(--steel),var(--sky));background:linear-gradient(90deg,var(--navy),var(--steel),var(--sky))"></div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-building me-1" style="color:var(--steel)"></i>Client *</label>
            <select name="client" class="form-select" required>
              <option value="">— Sélectionnez un client —</option>
              {% for c in liste_client %}
              <option value="{{ c.name }}">{{ c.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-heading me-1" style="color:var(--steel)"></i>Titre du rapport *</label>
            <input type="text" name="titre" class="form-control"
                   placeholder="Rapport de vérification du ..." required/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label"><i class="fas fa-calendar me-1" style="color:var(--steel)"></i>Date de création *</label>
              <input type="date" name="create_at" class="form-control" required/>
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label"><i class="fas fa-calendar-check me-1" style="color:var(--steel)"></i>Date de vérification *</label>
              <input type="date" name="date_verification" class="form-control" required/>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary py-2" style="font-weight:700;font-size:14px">
              <i class="fas fa-save me-2"></i>Créer le rapport
            </button>
            <a href="{% url 'article:crm' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
