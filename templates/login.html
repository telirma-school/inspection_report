{% extends 'main.html' %}
{% block title %}Connexion — TELIRMA{% endblock %}

{% block contend %}
<div class="auth-wrapper">
  <div class="auth-card-wrapper">
    <div class="text-center mb-4">
      <div style="width:68px;height:68px;background:-webkit-linear-gradient(225deg,var(--navy),var(--royal));background:linear-gradient(135deg,var(--navy),var(--royal));border-radius:16px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;margin:0 auto 16px;-webkit-box-shadow:0 8px 24px rgba(13,43,94,0.3);box-shadow:0 8px 24px rgba(13,43,94,0.3)">
        <i class="fas fa-shield-alt fa-2x text-white"></i>
      </div>
      <h2 style="font-family:'Exo 2',sans-serif;font-weight:800;color:var(--navy)">Connexion</h2>
      <p class="text-muted" style="font-size:13px">Accédez à votre espace TELIRMA</p>
    </div>
    <div class="card border-0" style="-webkit-box-shadow:0 8px 40px rgba(13,43,94,0.12);box-shadow:0 8px 40px rgba(13,43,94,0.12)">
      <div style="height:4px;background:-webkit-linear-gradient(left,var(--navy),var(--steel),var(--sky));background:linear-gradient(90deg,var(--navy),var(--steel),var(--sky))"></div>
      <div class="card-body p-4">
        <form method="post" action="{% url 'article:login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-user me-1" style="color:var(--steel)"></i>Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Entrez votre identifiant" required autofocus/>
          </div>
          <div class="mb-4">
            <label class="form-label"><i class="fas fa-lock me-1" style="color:var(--steel)"></i>Mot de passe</label>
            <div class="input-group">
              <input type="password" id="pwd" name="password" class="form-control"
                     placeholder="Entrez votre mot de passe" required/>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()" tabindex="-1">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2" style="font-weight:700;font-size:14px">
            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
          </button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3" style="font-size:13px;color:var(--muted)">
      Pas encore de compte ?
      <a href="{% url 'article:register' %}" style="color:var(--steel);font-weight:600">Créer un compte</a>
    </p>
  </div>
</div>
{% block extra_js %}
<script>
function togglePwd(){
  var p=document.getElementById('pwd');
  var i=document.getElementById('eyeIcon');
  if(p.type==='password'){p.type='text';i.className='fas fa-eye-slash';}
  else{p.type='password';i.className='fas fa-eye';}
}
</script>
{% endblock %}
{% endblock %}
