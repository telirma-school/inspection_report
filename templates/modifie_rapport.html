{% extends 'main.html' %}
{% block title %}Modifier rapport — TELIRMA{% endblock %}

{% block contend %}
<div class="page-header">
  <div>
    <h1><i class="fas fa-edit me-2" style="color:var(--steel)"></i>Modifier le rapport</h1>
    <p>{{ rapport.rapport_number }} — {{ rapport.client.name }}</p>
  </div>
  <a href="{% url 'article:crm' %}" class="btn btn-outline-primary btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Retour CRM
  </a>
</div>
<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-8">
    <div class="card border-0" style="-webkit-box-shadow:0 4px 24px rgba(13,43,94,0.1);box-shadow:0 4px 24px rgba(13,43,94,0.1)">
      <div style="height:4px;background:-webkit-linear-gradient(left,var(--navy),var(--steel),var(--sky));background:linear-gradient(90deg,var(--navy),var(--steel),var(--sky))"></div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label"><i class="fas fa-hashtag me-1" style="color:var(--steel)"></i>N° Rapport</label>
              <input type="text" name="rapport_number" class="form-control"
                     value="{{ rapport.rapport_number }}" readonly
                     style="background:var(--ice);color:var(--muted)"/>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label"><i class="fas fa-building me-1" style="color:var(--steel)"></i>Client</label>
              <input type="text" name="client" class="form-control"
                     value="{{ rapport.client.name }}" readonly
                     style="background:var(--ice);color:var(--muted)"/>
            </div>
            <div class="col-12">
              <label class="form-label"><i class="fas fa-heading me-1" style="color:var(--steel)"></i>Titre du rapport *</label>
              <textarea name="titre" class="form-control" rows="2" required>{{ rapport.titre }}</textarea>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label"><i class="fas fa-calendar-check me-1" style="color:var(--steel)"></i>Date de vérification *</label>
              <input type="date" name="date_verification" class="form-control"
                     value="{{ rapport.date_verification|date:'Y-m-d' }}" required/>
            </div>
          </div>
          <div class="d-flex flex-wrap gap-2 mt-4">
            <button type="submit" class="btn btn-primary px-4" style="font-weight:700">
              <i class="fas fa-save me-2"></i>Enregistrer les modifications
            </button>
            <a href="{% url 'article:crm' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
