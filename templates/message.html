{% if messages %}
<div class="messages-wrap" aria-live="polite" aria-atomic="false">
  {% for message in messages %}
  <div class="toast show toast-msg mb-2
    {% if message.tags == 'error' %}border-danger
    {% elif message.tags == 'success' %}border-success
    {% else %}border-primary{% endif %}"
       role="alert" aria-live="assertive">
    <div class="toast-header
      {% if message.tags == 'error' %}bg-danger text-white
      {% elif message.tags == 'success' %}bg-success text-white
      {% else %}bg-primary text-white{% endif %}">
      <i class="fas
        {% if message.tags == 'error' %}fa-exclamation-circle
        {% elif message.tags == 'success' %}fa-check-circle
        {% else %}fa-info-circle{% endif %} me-2"></i>
      <strong class="me-auto">
        {% if message.tags == 'error' %}Erreur
        {% elif message.tags == 'success' %}Succès
        {% else %}Information{% endif %}
      </strong>
      <button type="button" class="btn-close btn-close-white"
              data-bs-dismiss="toast" aria-label="Fermer"></button>
    </div>
    <div class="toast-body bg-white" style="font-size:13px">{{ message }}</div>
  </div>
  {% endfor %}
</div>
<script>
  setTimeout(function(){
    var toasts = document.querySelectorAll('.toast-msg');
    for(var i=0;i<toasts.length;i++){
      toasts[i].style.opacity='0';
      toasts[i].style.transition='opacity 0.4s';
      setTimeout((function(t){ return function(){ t.style.display='none'; }; })(toasts[i]), 400);
    }
  }, 5000);
</script>
{% endif %}
