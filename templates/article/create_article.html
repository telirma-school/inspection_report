{% extends 'main.html' %}
{% block title %}Nouvel article — TELIRMA{% endblock %}

{% block contend %}
<div class="page-header">
  <div>
    <h1><i class="fas fa-pen-nib me-2" style="color:var(--steel)"></i>Nouvel article</h1>
    <p>Rédiger et publier un article sur le blog</p>
  </div>
  <a href="{% url 'article:blog' %}" class="btn btn-outline-primary btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Retour blog
  </a>
</div>
<div class="row justify-content-center">
  <div class="col-12 col-md-9 col-lg-7">
    <div class="card border-0" style="-webkit-box-shadow:0 4px 24px rgba(13,43,94,0.1);box-shadow:0 4px 24px rgba(13,43,94,0.1)">
      <div style="height:4px;background:-webkit-linear-gradient(left,var(--navy),var(--steel),var(--sky));background:linear-gradient(90deg,var(--navy),var(--steel),var(--sky))"></div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-heading me-1" style="color:var(--steel)"></i>Titre *</label>
            <input type="text" name="titre" class="form-control"
                   placeholder="Titre de l'article" required/>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-user me-1" style="color:var(--steel)"></i>Auteur *</label>
            <input type="text" name="auteur" class="form-control"
                   placeholder="Nom de l'auteur" required/>
          </div>
          <div class="mb-4">
            <label class="form-label"><i class="fas fa-align-left me-1" style="color:var(--steel)"></i>Contenu *</label>
            <textarea name="contenu" class="form-control" rows="8"
                      placeholder="Rédigez votre article ici..." required
                      style="min-height:180px"></textarea>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-primary px-4" style="font-weight:700">
              <i class="fas fa-paper-plane me-2"></i>Publier l'article
            </button>
            <a href="{% url 'article:blog' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
